components:
  schemas:
    Application:
      type: object
      description: |-
        Full serializer for an Application record.

        On reads: embeds a lightweight job listing snapshot and document metadata.
        On writes: accepts FKs for job_listing, resume, and cover_letter.
        The user field is always derived from the authenticated request context.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        job_listing:
          type: integer
        job_listing_detail:
          allOf:
          - $ref: '#/components/schemas/JobListingMini'
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        status_display:
          type: string
          readOnly: true
        resume:
          type: integer
          nullable: true
          description: Tailored resume used for this application.
        cover_letter:
          type: integer
          nullable: true
          description: Cover letter used for this application.
        notes:
          type: string
          description: Private notes about this application (interviews, contacts,
            etc.).
        applied_at:
          type: string
          format: date-time
          nullable: true
          description: When the user actually submitted the application.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - job_listing
      - job_listing_detail
      - status_display
      - updated_at
      - user
    ApplicationRequest:
      type: object
      description: |-
        Full serializer for an Application record.

        On reads: embeds a lightweight job listing snapshot and document metadata.
        On writes: accepts FKs for job_listing, resume, and cover_letter.
        The user field is always derived from the authenticated request context.
      properties:
        job_listing:
          type: integer
        status:
          $ref: '#/components/schemas/StatusEnum'
        resume:
          type: integer
          nullable: true
          description: Tailored resume used for this application.
        cover_letter:
          type: integer
          nullable: true
          description: Cover letter used for this application.
        notes:
          type: string
          description: Private notes about this application (interviews, contacts,
            etc.).
        applied_at:
          type: string
          format: date-time
          nullable: true
          description: When the user actually submitted the application.
      required:
      - job_listing
    ApplicationStatusUpdate:
      type: object
      description: |-
        Minimal serializer for PATCH requests that only update the pipeline status
        (e.g. moving a card on the Kanban board).
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        applied_at:
          type: string
          format: date-time
          nullable: true
          description: When the user actually submitted the application.
        notes:
          type: string
          description: Private notes about this application (interviews, contacts,
            etc.).
    BlankEnum:
      enum:
      - ''
    DocTypeEnum:
      enum:
      - resume
      - cover_letter
      - portfolio
      - other
      type: string
      description: |-
        * `resume` - Resume
        * `cover_letter` - Cover Letter
        * `portfolio` - Portfolio
        * `other` - Other
    Document:
      type: object
      description: |-
        Serializer for Document metadata.
        The actual file upload to S3 is handled separately via a presigned-URL
        flow; this serializer deals only with the metadata record.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        file_url:
          type: string
          format: uri
          description: Full URL to the file in the storage bucket.
          maxLength: 2000
        file_name:
          type: string
          description: Original filename as uploaded by the user or generated by AI.
          maxLength: 500
        storage_key:
          type: string
          description: Storage backend object key (e.g. S3 key). Used for deletion
            and refresh.
          maxLength: 1000
        doc_type:
          $ref: '#/components/schemas/DocTypeEnum'
        doc_type_display:
